<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Age Verification{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#0f1117",
            "surface-card": "#1a1d27",
            "surface-border": "#2a2d3a",
            "accent": "#00bfae",
            "accent-dim": "#00857a",
            "allow": "#22c55e",
            "restrict": "#ef4444",
          },
          fontFamily: { "body": ["Inter"] },
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f1117; color: #e2e8f0; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #1a1d27; } ::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 3px; }
    .progress-bar { transition: width 0.4s ease; }
    .card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 12px; }
    .btn-accent { background: #00bfae; color: #0f1117; font-weight: 600; border-radius: 8px; padding: 10px 20px; cursor: pointer; transition: background 0.2s; border: none; }
    .btn-accent:hover { background: #00857a; }
    .btn-secondary { background: #2a2d3a; color: #e2e8f0; font-weight: 500; border-radius: 8px; padding: 10px 20px; cursor: pointer; transition: background 0.2s; border: none; }
    .btn-secondary:hover { background: #363a4a; }
    .tag-allow { background: #14532d; color: #22c55e; border-radius: 6px; padding: 2px 10px; font-size: 12px; font-weight: 600; }
    .tag-restrict { background: #450a0a; color: #ef4444; border-radius: 6px; padding: 2px 10px; font-size: 12px; font-weight: 600; }
    .tag-child { background: #1e3a5f; color: #60a5fa; border-radius: 6px; padding: 2px 10px; font-size: 12px; font-weight: 600; }
    .tag-teen { background: #3b2a0a; color: #fbbf24; border-radius: 6px; padding: 2px 10px; font-size: 12px; font-weight: 600; }
    .tag-adult { background: #14532d; color: #22c55e; border-radius: 6px; padding: 2px 10px; font-size: 12px; font-weight: 600; }
    .spinner { border: 3px solid #2a2d3a; border-top-color: #00bfae; border-radius: 50%; width: 28px; height: 28px; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    input[type=range] { accent-color: #00bfae; }
    select, input[type=text], input[type=password], input[type=number] {
      background: #0f1117; border: 1px solid #2a2d3a; color: #e2e8f0;
      border-radius: 8px; padding: 8px 12px; width: 100%; outline: none;
    }
    select:focus, input:focus { border-color: #00bfae; }
    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>
  {% block body %}{% endblock %}
  {% block extra_scripts %}{% endblock %}
</body>
</html>
